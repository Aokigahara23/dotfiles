# Window rules
windowrule = opacity 0.90 0.90,^(.+)$
windowrule = float,^(pavucontrol)$

windowrulev2 = maxsize 800 500, floating:1
windowrulev2 = center, floating:1
windowrulev2 = workspace 1, class:(firefox)
windowrulev2 = workspace 4, class:(org.telegram.desktop)
windowrulev2 = workspace 5, class:(steam)
windowrulev2 = workspace 6, class:(mpv)
windowrulev2 = opacity 1.0 1.0 override, class:^(firefox),title:(YouTube)
windowrulev2 = opacity 1.0 1.0 override, class:(kitty)
# windowrulev2 = suppressevent maximize, class:.* # You'll probably like this.
