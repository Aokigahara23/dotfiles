source = ./colorscheme.conf
source = ./env.conf

monitor = eDP-2,3200x2000@60,0x0,2

# Run various stuff
exec-once = waybar
exec-once = swaync
exec-once = hyprpaper
exec-once = hypridle

general {
  gaps_in = 5
  gaps_out = 15
  border_size = 2

  col.active_border = $mauve
  col.inactive_border = $base
}

decoration {
  rounding = 10

  fullscreen_opacity = 1

  drop_shadow = yes
  shadow_range = 4
  shadow_render_power = 3
  col.shadow = $base
}

input {
  kb_layout = us,ru
  kb_options = caps:swapescape,grp:alt_shift_toggle

  follow_mouse = 1
  sensitivity = 0

  touchpad {
      natural_scroll = yes
      scroll_factor = 0.2
  }
}

animations {
  enabled = true;

  bezier = overshot,0.05,0.9,0.1,1.1
  bezier = overshot,0.13,0.99,0.29,1.

  animation = windows,1,7,overshot,slide
  animation = border,1,10,default
  animation = fade,1,10,default
  animation = workspaces,1,7,overshot
}

xwayland {
  force_zero_scaling = true
}

# Window rules
windowrule = opacity 0.90 0.90,^(.+)$
windowrule = float,^(pavucontrol)$

windowrulev2 = center, floating:1
windowrulev2 = maxsize 800 500, floating:1
windowrulev2 = workspace 1, class:(firefox)
windowrulev2 = workspace 4, class:(org.telegram.desktop)
windowrulev2 = opacity 1.0 1.0 override, class:^(firefox),title:(YouTube)
windowrulev2 = opacity 1.0 1.0 override, class:(kitty)
windowrulev2 = suppressevent maximize, class:.* # You'll probably like this.

# bindings
$mainMod = SUPER

bind = $mainMod, T, exec, kitty
bind = $mainMod, W, killactive, 
bind = $mainMod, Q, exit, 
bind = $mainMod, L, togglefloating, 
bind = $mainMod, F, fullscreen,
bind = ALT, space, exec, rofi -show drun

bind = $mainMod_CTRL, right, exec, brightnessctl set 10%+
bind = $mainMod_CTRL, left, exec, brightnessctl set 10%-

bind = $mainMod_CTRL, up, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = $mainMod_CTRL, down, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
